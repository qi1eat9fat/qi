name: Auto Update Loon Plugin

on:
  schedule:
    # 每天北京时间早上 8:30 自动运行 (UTC 00:30)
    - cron: '30 0 * * *'
  workflow_dispatch: # 允许你在网页上点击手动触发更新

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write # 赋予 Actions 写入代码到仓库的权限

    steps:
    - name: 检出仓库代码
      uses: actions/checkout@v4

    - name: 设置 Python 环境
      uses: actions/setup-python@v5
      with:
        python-version: '3.x'

    - name: 运行转换脚本
      run: python convert.py

    - name: 检查是否有文件更新并提交
      run: |
        git config --local user.email "github-actions[bot]@users.noreply.github.com"
        git config --local user.name "github-actions[bot]"
        git add FanQieNovel.plugin
        if git diff --staged --quiet; then
          echo "No changes inside the plugin file."
        else
          git commit -m "自动更新: 同步最新番茄小说规则"
          git push
        fi
